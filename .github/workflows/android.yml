name: Android CI

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          body: |
            🚀 Dexify Yeni Sürüm Yayında!
            
            Bu sürümdeki öne çıkan özellikler:
            - Favoriler özelliği (Room DB ile lokal reaktif yönetim)
            - Detay ekranı ve MVVM mimarisiyle Lazy Loading
            - Lottie animasyonlu Splash ekranı ve Empty State tasarımı
            - Chucker entegrasyonu ile ağ dinleme
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}